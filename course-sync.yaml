name: course-sync
description: |
  自动同步飞书妙记到 Base 表格课程记录。
  当用户发送 Base 链接或说"同步课程"时触发。
  流程：lark-cli 拉取候选妙记 → lark-cli VC API 获取参会统计 → Claude 判断该不该录及分类 → lark-cli 写入 Base。
  替代旧版 Playwright/cookies 方案。无需任何外部 LLM API key。

triggers:
  - /course-sync
  - 同步课程
  - 同步妙记
  - 每日课程同步
  - 拉取最新课程
  - https://wlbyzcky.feishu.cn/wiki/TGGww8zijiQF2xk77tGcLYFtnW1
  - https://wlbyzcky.feishu.cn/wiki/TGGww8zijiQF2xk77tGcLYFtnW1?from=from_copylink

prompt: |
  用户想要同步飞书妙记到 Base 课程表格（也可能是为个人网站每日更新）。
  请按以下步骤执行。

  ## 步骤 0：环境检查
  运行：
  ```bash
  python3 course_sync_lark.py --check-env
  ```
  输出显示 `lark-cli 就绪 (user: ...)` 才继续。如果失败请按脚本提示处理（`npm i -g lark-cli`、`lark-cli config init` 等）。

  ## 步骤 1：收集候选妙记
  运行：
  ```bash
  python3 course_sync_lark.py --collect-only
  ```
  脚本会用 lark-cli **3 路并集**搜索最近妙记：
  1. `owner=me`（我创建的）
  2. `participant=me`（我参与的）
  3. 无 filter（捕获别人 share 给我但 owner/participant 都不是我的）

  输出 `/tmp/minutes_candidates.json`。

  ## 步骤 2：获取 VC 参会统计
  运行：
  ```bash
  python3 fetch_speakers_via_browser.py --from-candidates /tmp/minutes_candidates.json
  ```
  脚本不会打开浏览器。它会用 `lark-cli vc +search` 在候选日期附近搜索会议，用 `lark-cli vc +recording` 校验会议录制对应的 minute token，再用 `lark-cli vc meeting get --with-participants` 读取 VC 会议参会统计。

  输出 `/tmp/speaker_counts.json`。

  重点字段：
  - `participant_count`: 参会峰值人数，优先用于判断一对一/小会议/正式大课
  - `participant_count_accumulated`: 累计参会人数
  - `unique_participant_count`: participants 列表按 open_id 去重的人数
  - `match_status`: `matched` 表示已确认会议和妙记 token 对应；`not_matched` 表示没有可靠匹配，判断时应更保守

  ## 步骤 3：Claude 判断
  读取 `/tmp/minutes_candidates.json` 和 `/tmp/speaker_counts.json`，合并成完整候选数据。

  你的身份是「课程记录审核助手」。判断标准：
  - **应该录入**（`should_record: true`）：
    - 正式课程、公开课、模拟面试、押题课、复试课、报考分析课、班会课、开班课、写作指导课等与学生培训相关的内容
    - **且** 参会峰值人数（participant_count）一般应 ≥ 10
  - **不应该录入**（`should_record: false`）：
    - 内部闲聊会议、临时视频会议、OPC 培训、营前培训、个人成长讨论、园丁会议、非学生培训类的内部会议
    - participant_count < 10 的一对一交流、少数人会议、简单一对多非大课

  如果 participant_count < 10，但标题和上下文明显指向应归档的学生侧课程（例如模拟面试、小班专项课），可以录入，但 reasoning 必须说明原因。若 VC 未匹配到参会统计，优先按标题、时长、owner 和已有课程体系判断；不确定时跳过。

  对每一条，输出一个判断对象，字段如下：
  - `token`: 保持原值
  - `raw_name`: 保持原值
  - `url`: 保持原值
  - `date`: 保持原值
  - `duration`: 保持原值
  - `owner`: open_id
  - `owner_id`: open_id
  - `owner_name`: 显示名
  - `should_record`: true / false
  - `course_name`: 优化后的课程名称
  - `course_year`: 根据 date 推断，如 2026 年开课为 "27考研"
  - `course_category`: 从 Base 的 enum 中选择：
    公开课、班会课、报考分析课、人类简史、世界文明史、中国文学史、哲学导论、媒介与社会、艺术学概论、百日押题课、模考讲解课、材料评议课、复试讲解课、其他课程、783主题写作、785艺术作品评论、783/785通用
  - `importance`: "必刷课程" 或 "常规课程"
  - `participant_count`: 整数（从 speaker_counts.json 读取）
  - `reasoning`: 一句话判断理由

  判断完成后，使用 Write 或 Bash 工具生成 `/tmp/minutes_judgments.json`。

  如果没有候选（`candidates` 为空数组），直接跳到步骤 5。

  ## 步骤 4：执行写入 Base
  运行：
  ```bash
  python3 course_sync_lark.py --apply-judgments
  ```
  脚本会：
  1. 查询 Base 现有记录（按 token 索引、name 索引）
  2. 对每条 `should_record: true` 的判断：先按 token 查重，再按 course_name 查重
     - 找到 → 更新（upsert with --record-id）
     - 没找到 → 创建
  3. 输出 `/tmp/minutes_sync_report.json`（含 skipped / written / failed 详细列表）

  ## 步骤 5：导出给个人网站
  运行：
  ```bash
  python3 site_export.py
  ```
  脚本会从 Base 拉全表，导出为：
  - `courses.json` — 完整结构化数据
  - `courses.md` — Markdown 表格
  - `courses_index.json` — 按年份/类别分组
  - `courses_latest.json` — 仅最近 7 天
  - `stats.json` — 统计概览

  默认输出到 `/tmp/site_export/`，可通过 `--output` 或 `COURSE_SYNC_OUTPUT_DIR` 改。

  ## 步骤 6：总结报告
  用中文总结：
  1. 发现了多少条新妙记
  2. 成功写入/更新多少条、跳过多少条、失败多少条
  3. 列出被跳过的记录及理由
  4. 列出成功写入的记录（课程名称、年份、分类、重要程度、参与人数）
  5. 导出了哪些文件给网站
  6. 如有失败，说明原因及建议

  ## 故障排查
  - **`lark-cli 未认证`**：运行 `lark-cli config init` 重新走 OAuth
  - **妙记搜不到**：检查 user 身份是否在 `wlbyzcky.feishu.cn` 域有访问权限
  - **Base 写入 401/403**：检查 user 身份是否有该 Base 表的读写权限
  - **VC 参会统计全是 `not_matched`**：检查该妙记是否来自飞书视频会议录制，或 user 身份是否有会议记录权限
  - **`vc meeting get` 401/403**：检查 `vc:meeting:readonly` / `vc:meeting.meetingevent:read` 等权限和当前 user 授权
  - **少数妙记未匹配**：可能是标题被改过、会议不是当前 user 组织/参与、录制关系不可见；该条按人工判断保守处理
